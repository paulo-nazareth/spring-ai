spring.application.name=spring-ai

# Chat Open AI
#spring.ai.openai.base-url=api.openai.com
#spring.ai.openai.api-key=${OPENAI_API_KEY}

# Chat Gemini Google
	# Necessario Instalar e Configurar o GoogleCloudSDKInstaller	
spring.ai.vertex.ai.gemini.project-id=${PROJECT_ID}
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.5

# Chat Azure Microsoft
	# Create Account Microsoft Azure e Configure Azure OpenAI para Acesso
#spring.ai.azure.openai.api-key=${AZURE_OPENAI_API_KEY}
#spring.ai.azure.openai.endpoint=${AZURE_ENDPOINT}
	# Create Model Deployment no Azure AI Foundry
#spring.ai.azure.openai.chat.options.deployment-name=gpt-4o-mini

spring.ai.chat.memory.repository.jdbc.initialize-schema=never

#spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.url=jdbc:postgresql://localhost:60198/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
